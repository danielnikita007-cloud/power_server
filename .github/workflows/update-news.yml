name: Update Power Sector News

# Runs automatically every day at 05:30 UTC (~11:00 AM IST),
# and can also be triggered manually from the Actions tab.
on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch: {}

jobs:
  update-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest headlines
        run: node .github/scripts/fetch-news.js

      - name: Commit updated news.json (if changed)
        run: |
          git config user.name "power-dashboard-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/news.json
          if git diff --cached --quiet; then
            echo "No changes to news.json — nothing to commit."
          else
            git commit -m "Auto-update: latest power sector headlines"
            git push
          fi   
